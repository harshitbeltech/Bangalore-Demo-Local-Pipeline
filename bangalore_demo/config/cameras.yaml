# Per-camera sources. `source` is either an RTSP url or a local file path.
# `kind: rtsp` connects live; `kind: file` loops a video to simulate a stream.
# Disable a camera with `enabled: false`.
#
# NOTE: the RTSP password is Beltech@123 — the '@' is URL-encoded as %40 so it
# does not collide with the user:pass@host separator. Transport is forced to TCP
# via OPENCV_FFMPEG_CAPTURE_OPTIONS in core/_env.py. Streams are 1440p HEVC @ 25fps,
# sampled down to pipeline.target_fps (5).

